<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
    body, html {
  height: 100%;
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  font-size: large;
}

* {
  box-sizing: border-box;
}
.navbar {
  box-shadow: 0px 5px 10px 0px #aaa;
  align-items: center;
  justify-content: center;
  position: absolute;
  width: 100%;
  background: white;
  color:black;
  opacity: 0.85;
  height: 50px;
  z-index: 12;
}

.navbar-container {
  display: flex;
  justify-content: space-between;
  height: 64px;
  align-items: center;
}
.navbar-container h1 {
    text-align: center;
}
.logo {
  order: 1;
  font-size: 2.3rem;
  margin-left: 10%;
}
.bg-image {
  background-image: url("https://i.postimg.cc/wT3TQS3V/header-image2.jpg");
  filter: blur(8px);
  -webkit-filter: blur(5px);
  height: 100%; 
  background-position: center;
  background-repeat: no-repeat;
  background-size: cover;
}
@keyframes bg-text-animation {
  100% {
    transform: translate(0);
  }
}
.bg-text {
  background-color: rgb(0,0,0); 
  background-color: rgba(0,0,0, 0.4); 
  color: black;
  font-weight: bold;
  border: 3px solid #f1f1f1;
  border-radius: 10px;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 2;
  width: 500px;
  height: 500px;
  padding: 20px;
  text-align: center;
  animation: bg-text-animation 1s e;
}

input {
  width: 300px;
  padding: 12px;
  color: gray;
  border: none;
  border-radius: 50px;
  margin: 5px 0;
  opacity: 0.85;
  display: inline-block;
  font-size: 17px;
  line-height: 20px;
  text-decoration: none;
   
}
input:hover {
  opacity: 1;
}


#login-button {
    display: inline-block;
    width: 300px;
    padding: 12px;
    line-height: 20px;
    background-color: white;
    color: gray;
    border: none;
    border-radius: 50px;
    margin: 5px 0;
    display: inline-block;
    font-size: 17px;
    line-height: 20px;
    cursor: grab;
    text-align: center;
    text-decoration: none;
}

#login-button:hover {
    background-color: ghostwhite;
}
#button {
  border-radius: 50px;
  background-color: white;
  color: black;
  cursor: grab;
  width: 20%;
  height: 6%;
}
#button:hover {
  opacity: 1;
  background-color: ghostwhite;
}
    </style>
</head>
    <body>
    <script>
       function validateForm() {
      var name = document.forms["Form"]["name"].value;
      var email = document.forms["Form"]["email"].value;
      var password = document.forms["Form"]["password"].value;

      if (name == "" || email == "" || password == "") {
        alert("All fields must be filled out.");
        return false;
      }
        else{
          alert("Registration Succesfully");
        }
      }
      function goBack() {
  window.history.back()
}
    </script>
    <nav class="navbar">
        <div class="navbar-container container">
            <h1 class="logo">RS</h1>
        </div>
    </nav>

<div class="bg-image"></div>

<div class="bg-text">
  <form name="Form" method="post">
  <h1>Register Your Account With Us!</h1>
  <input type="name" name="name" placeholder="name" required>
  <br><br>
  <input type="email"  name="email" placeholder="email or phone number" required>
<br><br>
  <input type="password" name="password" placeholder="Password" required>
<br><br>
<button type="submit" name="login-button" onclick="validateForm ()" id="login-button" class="login-button">SUBMIT</button>
<br><br>
<button onclick="goBack()" id="button">Go Back</button>
  </form>
</div>
</body>
</html>
